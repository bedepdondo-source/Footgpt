<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration | Tableau de bord</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container-fluid px-4 max-w-7xl">
            <span class="navbar-brand mb-0 fw-bold d-flex align-items-center">
                <div style="width:24px;height:24px;background:white;border-radius:2px;display:flex;align-items:center;justify-content:center;margin-right:8px;">
                    <div style="width:16px;height:16px;border:2px solid var(--dark-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;">
                        <div style="width:6px;height:6px;background:var(--dark-bg);border-radius:50%;"></div>
                    </div>
                </div>
                Football Net Actu | Admin Dashboard
            </span>
            <div class="d-flex">
                <a href="/" class="btn btn-outline-light me-3">Voir le site</a>
                <button onclick="logout()" class="btn btn-danger">Déconnexion</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 my-4">
        <div class="row">
            <!-- Form Column -->
            <div class="col-xl-4 col-lg-5 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-football text-white py-3">
                        <h5 class="mb-0 fw-bold" id="form-title">Ajouter un Article</h5>
                    </div>
                    <div class="card-body bg-white p-4">
                        <form id="article-form">
                            <input type="hidden" id="article-id">
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small">Titre</label>
                                <input type="text" id="article-title" class="form-control" placeholder="Titre de l'article" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small">Catégorie</label>
                                <select id="article-category" class="form-select" required>
                                    <option value="Actualité">Actualité</option>
                                    <option value="Transfert">Transfert</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small">URL de l'image</label>
                                <input type="url" id="article-image" class="form-control" placeholder="https://..." required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold text-muted small">Contenu</label>
                                <textarea id="article-content" class="form-control" rows="8" placeholder="Contenu de l'article..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-success w-100 fw-bold py-2" id="btn-save">Enregistrer l'article</button>
                            <button type="button" class="btn btn-light border w-100 mt-2 d-none fw-bold text-muted" id="btn-cancel-edit" onclick="resetForm()">Annuler</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <!-- List Column -->
            <div class="col-xl-8 col-lg-7">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-dark text-white py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 fw-bold">Liste des Articles</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light text-muted small">
                                    <tr>
                                        <th class="ps-4">Date</th>
                                        <th>Titre</th>
                                        <th>Catégorie</th>
                                        <th class="text-end pe-4">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="admin-articles-list">
                                    <tr><td colspan="4" class="text-center py-5"><div class="spinner-border text-success" role="status"></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadAdminArticles();
            document.getElementById('article-form').addEventListener('submit', handleArticleSubmit);
        });
    </script>
</body>
</html>
