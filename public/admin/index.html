<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration | Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-football">
        <div class="container max-w-7xl">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
                <div style="width:24px;height:24px;background:white;border-radius:2px;display:flex;align-items:center;justify-content:center;margin-right:8px;">
                    <div style="width:16px;height:16px;border:2px solid var(--football-green);border-radius:50%;display:flex;align-items:center;justify-content:center;">
                        <div style="width:6px;height:6px;background:var(--football-green);border-radius:50%;"></div>
                    </div>
                </div>
                Football Net Actu
            </a>
        </div>
    </nav>
    <div class="container mt-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow border-0">
                    <div class="card-header bg-football text-white text-center py-3">
                        <h4 class="mb-0 fw-bold">Admin Login</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="login-form">
                            <div class="mb-4">
                                <label for="password" class="form-label text-muted fw-bold">Mot de passe</label>
                                <input type="password" class="form-control form-control-lg" id="password" placeholder="••••••••" required>
                            </div>
                            <div id="login-error" class="text-danger small mb-3 d-none fw-bold">Mot de passe incorrect ou erreur réseau</div>
                            <button type="submit" class="btn btn-success btn-lg w-100 fw-bold">Se connecter</button>
                            <div class="text-center mt-3">
                                <a href="/" class="text-decoration-none text-muted small">Retour au site public</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/main.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', handleLogin);
    </script>
</body>
</html>
